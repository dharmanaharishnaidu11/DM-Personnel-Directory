<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Government - Department Structure &amp; Hierarchy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--border:#d0d5dd;--text:#1a1a2e;--muted:#5f6b7a;
  --blue:#2563eb;--green:#059669;--orange:#d97706;--red:#dc2626;--purple:#7c3aed;
  --teal:#0d9488;--pink:#db2777;--indigo:#4f46e5;
  --cm:#1e3a5f;--minister:#b45309;--secretary:#1d4ed8;--dept:#065f46;
  --hod:#7c2d12;--ao:#4338ca;--su:#0f766e;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

/* ── Header ── */
.header{background:linear-gradient(135deg,#1e3a5f 0%,#0f766e 100%);color:#fff;padding:18px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:20px;font-weight:700;letter-spacing:.3px}
.header .sub{font-size:12px;opacity:.75;margin-top:2px}
.header .stats{margin-left:auto;display:flex;gap:16px;font-size:12px}
.header .stat{text-align:center}
.header .stat b{display:block;font-size:22px;font-weight:700}

/* ── Toolbar ── */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:200px;padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:#fff}
.toolbar button{padding:7px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:#f0f2f5}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid var(--border);padding:0 24px}
.tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);transition:.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── Content ── */
.content{padding:20px 24px;max-width:1400px;margin:0 auto}

/* ── Summary Cards ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.s-card{background:#fff;border-radius:8px;padding:14px 16px;border-left:4px solid var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.s-card .s-val{font-size:26px;font-weight:700;color:var(--blue)}
.s-card .s-lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.s-card.green{border-color:var(--green)}.s-card.green .s-val{color:var(--green)}
.s-card.orange{border-color:var(--orange)}.s-card.orange .s-val{color:var(--orange)}
.s-card.purple{border-color:var(--purple)}.s-card.purple .s-val{color:var(--purple)}
.s-card.teal{border-color:var(--teal)}.s-card.teal .s-val{color:var(--teal)}
.s-card.red{border-color:var(--red)}.s-card.red .s-val{color:var(--red)}

/* ── Tree ── */
.tree{font-size:13px}
.tree-node{position:relative;padding-left:24px}
.tree-node::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:#d0d5dd}
.tree-node:last-child::before{bottom:50%}
.tree-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:.1s;position:relative}
.tree-item:hover{background:#f0f4ff}
.tree-item::before{content:'';position:absolute;left:-16px;top:50%;width:14px;height:1px;background:#d0d5dd}
.tree-node:first-child>.tree-item::before,.tree-root>.tree-item::before{display:none}
.tree-root{padding-left:0}.tree-root::before{display:none}
.tree-root>.tree-item::before{display:none}

/* Toggle */
.toggle{width:18px;height:18px;border-radius:4px;background:#e8ecf1;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;transition:.15s}
.toggle:hover{background:#d0d5dd}
.toggle.expanded{background:var(--blue);color:#fff}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.b-cm{background:#1e3a5f;color:#fff}
.b-minister{background:#fef3c7;color:#92400e;border:1px solid #fbbf24}
.b-secretary{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.b-dept{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.b-hod{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.b-ao{background:#ede9fe;color:#5b21b6;border:1px solid #c4b5fd}
.b-su{background:#ccfbf1;color:#134e4a;border:1px solid #5eead4}

.node-label{font-weight:500;color:var(--text)}
.node-sub{font-size:11px;color:var(--muted);margin-left:4px}
.node-count{font-size:10px;background:#e8ecf1;color:var(--muted);padding:1px 6px;border-radius:8px;margin-left:auto;flex-shrink:0}
.node-officer{font-size:11px;color:var(--blue);margin-left:8px;font-style:italic}

/* children container */
.tree-children{display:none;margin-left:0}
.tree-children.open{display:block}

/* ── Legend ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px}
.legend-dot{width:12px;height:12px;border-radius:3px}

/* ── Department detail panel ── */
.dept-panel{display:none;background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-top:16px}
.dept-panel.visible{display:block}
.dept-panel h2{font-size:18px;margin-bottom:12px;color:var(--dept)}
.dept-panel .chain{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:8px}
.chain-arrow{color:var(--muted);font-size:14px}
.dept-panel .org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.org-card{padding:10px 14px;border-radius:8px;border:1px solid var(--border);transition:.15s}
.org-card:hover{border-color:var(--blue);box-shadow:0 2px 6px rgba(37,99,235,.1)}
.org-card .org-name{font-weight:600;font-size:13px}
.org-card .org-type{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.org-card .org-officer{font-size:12px;color:var(--blue);margin-top:4px}
.org-card.hod-card{border-left:3px solid var(--hod)}.org-card.hod-card .org-type{color:var(--hod)}
.org-card.ao-card{border-left:3px solid var(--ao)}.org-card.ao-card .org-type{color:var(--ao)}
.org-card.su-card{border-left:3px solid var(--su)}.org-card.su-card .org-type{color:var(--su)}

/* ── Department List view ── */
.dept-list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.dept-tile{background:#fff;border-radius:10px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.dept-tile:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 12px rgba(37,99,235,.12)}
.dept-tile .dt-code{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.dept-tile .dt-name{font-size:14px;font-weight:600;margin-top:4px;color:var(--text)}
.dept-tile .dt-meta{display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--muted)}
.dept-tile .dt-meta b{color:var(--text)}
.dept-tile .dt-minister{font-size:11px;color:var(--minister);margin-top:6px}
.dept-tile .dt-secretary{font-size:11px;color:var(--secretary);margin-top:2px}

/* ── Secretaries tab ── */
.sec-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border)}
.sec-table td{padding:8px 14px;border-bottom:1px solid #f0f2f5;font-size:13px}
.sec-table tr:hover td{background:#f8fafc}

/* ── Panels ── */
.panel{display:none}.panel.active{display:block}

/* ── Responsive ── */
@media(max-width:768px){
  .header{flex-direction:column;text-align:center}
  .header .stats{margin-left:0}
  .toolbar{flex-direction:column}
  .toolbar input[type=text]{min-width:100%}
}

/* ── Print ── */
@media print{
  .toolbar,.tabs{display:none}
  .tree-children{display:block!important}
}
</style>
</head>

</div>

// ═══════════════════════════════════════════════════
// MASTER TREE
// ═══════════════════════════════════════════════════
function buildMasterTree(){
  var container = $("master-tree");
  // Group departments by minister
  var ministerMap = {};
  var deptNames = DATA.stateDepts.map(function(d){return d.name});
  deptNames.forEach(function(dName){
    var m = DATA.ministry[dName];
    if(!m) return;
    var mKey = m.minister;
    if(!ministerMap[mKey]) ministerMap[mKey]={minister:mKey,depts:[]};
    ministerMap[mKey].depts.push({name:dName,secretary:m.secretary,hods:m.hods||[]});
  });

  var html = '';
  // Root: Government of AP
  html += '<div class="tree-root">';
  html += '<div class="tree-item" onclick="toggleChildren(this)">';
  html += '<span class="toggle expanded">-</span>';
  html += '<span class="badge b-cm">GOV</span>';
  html += '<span class="node-label"><b>Government of Andhra Pradesh</b></span>';
  html += '<span class="node-count">'+Object.keys(ministerMap).length+' Ministers</span>';
  html += '</div>';
  html += '<div class="tree-children open">';

  // Chief Minister node
  html += '<div class="tree-node">';
  html += '<div class="tree-item" onclick="toggleChildren(this)">';
  html += '<span class="toggle expanded">-</span>';
  html += '<span class="badge b-cm">CM</span>';
  html += '<span class="node-label"><b>Sri Nara Chandrababu Naidu</b></span>';
  html += '<span class="node-sub">Chief Minister</span>';
  html += '<span class="node-count">'+Object.keys(ministerMap).length+' Ministers</span>';
  html += '</div>';
  html += '<div class="tree-children open">';

  // Ministers
  var ministers = Object.keys(ministerMap).sort();
  ministers.forEach(function(mKey){
    var mData = ministerMap[mKey];
    html += '<div class="tree-node">';
    html += '<div class="tree-item" onclick="toggleChildren(this)">';
    html += '<span class="toggle">+</span>';
    html += '<span class="badge b-minister">MIN</span>';
    html += '<span class="node-label">'+esc(mKey)+'</span>';
    html += '<span class="node-count">'+mData.depts.length+' dept'+(mData.depts.length>1?'s':'')+'</span>';
    html += '</div>';
    html += '<div class="tree-children">';

    // Departments under this minister
    mData.depts.forEach(function(dept){
      var orgs = DATA.deptOrgs[dept.name]||[];
      var hodCount = orgs.filter(function(o){return o.type==='HOD'}).length;
      var aoCount = orgs.filter(function(o){return o.type==='AO'}).length;
      var sd = DATA.stateDepts.find(function(s){return s.name===dept.name});
      var code = sd?sd.short:'';

      html += '<div class="tree-node">';
      // Secretary line
      if(dept.secretary){
        html += '<div class="tree-item" style="opacity:.7;padding-left:30px;font-size:11px;cursor:default">';
        html += '<span class="badge b-secretary" style="font-size:9px">SEC</span>';
        html += '<span class="node-label" style="font-weight:400;font-size:11px">'+esc(dept.secretary)+'</span>';
        html += '</div>';
      }
      html += '<div class="tree-item" onclick="toggleChildren(this)">';
      html += '<span class="toggle">+</span>';
      html += '<span class="badge b-dept">'+esc(code)+'</span>';
      html += '<span class="node-label">'+esc(dept.name)+'</span>';
      var meta = [];
      if(hodCount) meta.push(hodCount+' HOD'+(hodCount>1?'s':''));
      if(aoCount) meta.push(aoCount+' AO'+(aoCount>1?'s':''));
      if(meta.length) html += '<span class="node-count">'+meta.join(', ')+'</span>';
      html += '</div>';
      html += '<div class="tree-children">';

      // HODs
      orgs.forEach(function(org){
        var cls = org.type==='HOD'?'b-hod':'b-ao';
        html += '<div class="tree-node">';
        html += '<div class="tree-item" style="cursor:default">';
        html += '<span class="badge '+cls+'">'+org.type+'</span>';
        html += '<span class="node-label" style="font-weight:400">'+esc(org.name)+'</span>';
        html += '</div>';
        // State units under this dept
        if(org.type==='HOD' && sd){
          var units = DATA.stateUnits.filter(function(u){return u.reporting===sd.short});
          if(units.length && org===orgs.filter(function(o){return o.type==='HOD'})[0]){
            units.forEach(function(u){
              html += '<div class="tree-node" style="padding-left:32px">';
              html += '<div class="tree-item" style="cursor:default">';
              html += '<span class="badge b-su">SU</span>';
              html += '<span class="node-label" style="font-weight:400;font-size:12px">'+esc(u.name)+'</span>';
              html += '</div></div>';
            });
          }
        }
        html += '</div>';
      });

      html += '</div></div>'; // close children + node
    });

    html += '</div></div>'; // close minister children + node
  });

  html += '</div></div>'; // close CM children + node
  html += '</div></div>'; // close root children + root

  container.innerHTML = html;
}

function toggleChildren(el){
  var children = el.nextElementSibling;
  if(!children || !children.classList.contains("tree-children")) return;
  var toggle = el.querySelector(".toggle");
  if(children.classList.contains("open")){
    children.classList.remove("open");
    if(toggle){toggle.textContent="+";toggle.classList.remove("expanded")}
  } else {
    children.classList.add("open");
    if(toggle){toggle.textContent="-";toggle.classList.add("expanded")}
  }
}

function expandAll(){
  document.querySelectorAll(".tree-children").forEach(function(c){c.classList.add("open")});
  document.querySelectorAll(".toggle").forEach(function(t){t.textContent="-";t.classList.add("expanded")});
}
function collapseAll(){
  document.querySelectorAll(".tree-children").forEach(function(c){c.classList.remove("open")});
  document.querySelectorAll(".toggle").forEach(function(t){t.textContent="+";t.classList.remove("expanded")});
  // Keep root open
  var root = document.querySelector(".tree-root > .tree-children");
  if(root){root.classList.add("open");var t=root.previousElementSibling.querySelector(".toggle");if(t){t.textContent="-";t.classList.add("expanded")}}
}

// DEPARTMENTS PANEL
// ═══════════════════════════════════════════════════
function buildDeptList(){
  var container = $("dept-list");
  var html = '';
  DATA.stateDepts.forEach(function(sd){
    var orgs = DATA.deptOrgs[sd.name]||[];
    var m = DATA.ministry[sd.name]||{};
    var hodCount = orgs.filter(function(o){return o.type==='HOD'}).length;
    var aoCount = orgs.filter(function(o){return o.type==='AO'}).length;
    html += '<div class="dept-tile" onclick="showDeptDetail(\''+esc(sd.name.replace(/'/g,"\\'"))+'\')">';
    html += '<div class="dt-code">'+esc(sd.code)+' / '+esc(sd.short)+'</div>';
    html += '<div class="dt-name">'+esc(sd.name)+'</div>';
    html += '<div class="dt-meta">';
    html += '<span><b>'+hodCount+'</b> HODs</span>';
    html += '<span><b>'+aoCount+'</b> AOs</span>';
    html += '<span><b>'+(hodCount+aoCount)+'</b> Total</span>';
    html += '</div>';
    if(m.minister) html += '<div class="dt-minister">Minister: '+esc(m.minister)+'</div>';
    if(m.secretary) html += '<div class="dt-secretary">Secretary: '+esc(m.secretary)+'</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function showDeptDetail(deptName){
  var panel = $("dept-detail");
  var m = DATA.ministry[deptName]||{};
  var orgs = DATA.deptOrgs[deptName]||[];
  var sd = DATA.stateDepts.find(function(s){return s.name===deptName});
  var units = sd ? DATA.stateUnits.filter(function(u){return u.reporting===sd.short}) : [];

  var html = '<h2>'+esc(deptName)+'</h2>';

  // Chain: Minister -> Secretary -> Department
  html += '<div class="chain">';
  if(m.minister) html += '<span class="badge b-minister">'+esc(m.minister)+'</span><span class="chain-arrow">&#8594;</span>';
  if(m.secretary) html += '<span class="badge b-secretary">'+esc(m.secretary)+'</span><span class="chain-arrow">&#8594;</span>';
  html += '<span class="badge b-dept">'+esc(deptName)+'</span>';
  html += '</div>';

  // Officers from ministry data
  if(m.hods && m.hods.length){
    html += '<h3 style="font-size:14px;margin:12px 0 8px;color:var(--muted)">Officers / Designations</h3>';
    html += '<div class="org-grid">';
    m.hods.forEach(function(h){
      html += '<div class="org-card hod-card">';
      html += '<div class="org-name">'+esc(h.org)+'</div>';
      if(h.officer) html += '<div class="org-officer">'+esc(h.officer)+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // HODs
  var hods = orgs.filter(function(o){return o.type==='HOD'});
  if(hods.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;color:var(--hod)">Heads of Department ('+hods.length+')</h3>';
    html += '<div class="org-grid">';
    hods.forEach(function(o){
      html += '<div class="org-card hod-card"><div class="org-name">'+esc(o.name)+'</div><div class="org-type">HOD - Directorate</div></div>';
    });
    html += '</div>';
  }

  // AOs
  var aos = orgs.filter(function(o){return o.type==='AO'});
  if(aos.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;color:var(--ao)">Autonomous Organizations ('+aos.length+')</h3>';
    html += '<div class="org-grid">';
    aos.forEach(function(o){
      html += '<div class="org-card ao-card"><div class="org-name">'+esc(o.name)+'</div><div class="org-type">Autonomous Organization</div></div>';
    });
    html += '</div>';
  }

  // State Units
  if(units.length){
    html += '<h3 style="font-size:14px;margin:16px 0 8px;color:var(--su)">State Units ('+units.length+')</h3>';
    html += '<div class="org-grid">';
    units.forEach(function(u){
      html += '<div class="org-card su-card"><div class="org-name">'+esc(u.name)+'</div><div class="org-type">State Unit - '+esc(u.code)+'</div></div>';
    });
    html += '</div>';
  }

  html += '<div style="margin-top:16px"><button class="btn-outline" onclick="$(\'dept-detail\').classList.remove(\'visible\')">Close</button></div>';

  panel.innerHTML = html;
  panel.classList.add("visible");
  panel.scrollIntoView({behavior:"smooth",block:"start"});
}

// SECRETARIES PANEL
// ═══════════════════════════════════════════════════
function buildSecretariesPanel(){
  var container = $("sec-content");

  // Build minister -> secretary -> department table
  var html = '<h3 style="margin-bottom:12px">Minister &rarr; Secretary &rarr; Department Chain</h3>';
  html += '<table class="sec-table"><thead><tr><th>#</th><th>Department</th><th>Minister</th><th>Secretary</th><th>HODs/Orgs</th></tr></thead><tbody>';

  var i = 0;
  DATA.stateDepts.forEach(function(sd){
    var m = DATA.ministry[sd.name];
    if(!m) return;
    i++;
    var hodList = (m.hods||[]).map(function(h){
      var s = esc(h.org);
      if(h.officer) s += ' <span style="color:var(--blue)">(' + esc(h.officer) + ')</span>';
      return s;
    }).join('<br>');
    html += '<tr>';
    html += '<td>'+i+'</td>';
    html += '<td><b>'+esc(sd.name)+'</b><br><span style="font-size:11px;color:var(--muted)">'+esc(sd.code)+'</span></td>';
    html += '<td><span class="badge b-minister" style="font-size:10px">'+esc(m.minister)+'</span></td>';
    html += '<td><span class="badge b-secretary" style="font-size:10px">'+esc(m.secretary)+'</span></td>';
    html += '<td style="font-size:12px">'+hodList+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';

  // Secretaries list
  html += '<h3 style="margin:24px 0 12px">All Secretaries ('+DATA.secretaries.length+')</h3>';
  html += '<table class="sec-table"><thead><tr><th>#</th><th>Name</th><th>Designation</th><th>Department(s)</th></tr></thead><tbody>';
  DATA.secretaries.forEach(function(s,idx){
    html += '<tr><td>'+(idx+1)+'</td><td><b>'+esc(s.name)+'</b></td>';
    html += '<td>'+esc(s.designation)+'</td><td>'+esc(s.department)+'</td></tr>';
  });
  html += '</tbody></table>';

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// SUMMARY PANEL
// ═══════════════════════════════════════════════════
function buildSummary(){
  var totalHods=0, totalAos=0;
  var deptStats = [];
  DATA.stateDepts.forEach(function(sd){
    var orgs = DATA.deptOrgs[sd.name]||[];
    var h = orgs.filter(function(o){return o.type==='HOD'}).length;
    var a = orgs.filter(function(o){return o.type==='AO'}).length;
    totalHods += h; totalAos += a;
    deptStats.push({name:sd.name,code:sd.short,hods:h,aos:a,total:h+a});
  });
  deptStats.sort(function(a,b){return b.total-a.total});

  // Update header stats
  $("h-hods").textContent = totalHods;
  $("h-aos").textContent = totalAos;

  // Unique ministers
  var ministers = {};
  Object.keys(DATA.ministry).forEach(function(k){
    var m = DATA.ministry[k].minister;
    if(m) ministers[m] = (ministers[m]||0)+1;
  });

  var cards = $("summary-cards");
  cards.innerHTML = '<div class="s-card"><div class="s-val">'+DATA.stateDepts.length+'</div><div class="s-lab">State Departments</div></div>'
    + '<div class="s-card green"><div class="s-val">'+totalHods+'</div><div class="s-lab">Heads of Department</div></div>'
    + '<div class="s-card purple"><div class="s-val">'+totalAos+'</div><div class="s-lab">Autonomous Organizations</div></div>'
    + '<div class="s-card teal"><div class="s-val">'+DATA.stateUnits.length+'</div><div class="s-lab">State Units</div></div>'
    + '<div class="s-card orange"><div class="s-val">'+Object.keys(ministers).length+'</div><div class="s-lab">Ministers</div></div>'
    + '<div class="s-card red"><div class="s-val">'+DATA.secretaries.length+'</div><div class="s-lab">Secretaries</div></div>';

  // Dept ranking table
  var tHtml = '<h3 style="margin:20px 0 12px">Departments Ranked by Organization Count</h3>';
  tHtml += '<table class="sec-table"><thead><tr><th>#</th><th>Department</th><th>Code</th><th>HODs</th><th>AOs</th><th>Total</th></tr></thead><tbody>';
  deptStats.forEach(function(d,i){
    tHtml += '<tr><td>'+(i+1)+'</td><td>'+esc(d.name)+'</td><td>'+esc(d.code)+'</td>';
    tHtml += '<td><b>'+d.hods+'</b></td><td><b>'+d.aos+'</b></td><td><b>'+d.total+'</b></td></tr>';
  });
  tHtml += '</tbody></table>';

  // Ministers portfolio table
  tHtml += '<h3 style="margin:24px 0 12px">Minister Portfolios</h3>';
  tHtml += '<table class="sec-table"><thead><tr><th>#</th><th>Minister</th><th>Departments</th><th>Count</th></tr></thead><tbody>';
  var mSorted = Object.keys(ministers).sort(function(a,b){return ministers[b]-ministers[a]});
  mSorted.forEach(function(m,i){
    var depts = [];
    Object.keys(DATA.ministry).forEach(function(k){if(DATA.ministry[k].minister===m) depts.push(k)});
    tHtml += '<tr><td>'+(i+1)+'</td><td><b>'+esc(m)+'</b></td>';
    tHtml += '<td>'+depts.map(esc).join(', ')+'</td><td><b>'+ministers[m]+'</b></td></tr>';
  });
  tHtml += '</tbody></table>';

  $("summary-tables").innerHTML = tHtml;
}

// SEARCH
// ═══════════════════════════════════════════════════
$("search-box").addEventListener("input",function(){
  var q = this.value.toLowerCase().trim();
  if(!q){
    document.querySelectorAll(".tree-node,.dept-tile,.sec-table tr").forEach(function(el){el.style.display=""});
    return;
  }
  // Search in tree
  document.querySelectorAll(".tree-item").forEach(function(item){
    var text = item.textContent.toLowerCase();
    var node = item.parentElement;
    if(text.indexOf(q)>=0){
      node.style.display = "";
      // Expand parents
      var parent = node.parentElement;
      while(parent){
        if(parent.classList.contains("tree-children")){parent.classList.add("open");var t=parent.previousElementSibling;if(t){var tog=t.querySelector(".toggle");if(tog){tog.textContent="-";tog.classList.add("expanded")}}}
        parent = parent.parentElement;
      }
    }
  });
  // Search in dept tiles
  document.querySelectorAll(".dept-tile").forEach(function(tile){
    tile.style.display = tile.textContent.toLowerCase().indexOf(q)>=0 ? "" : "none";
  });
});
